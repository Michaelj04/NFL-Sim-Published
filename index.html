<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Franchise War Room</title>
    <style>
      #file-open-help {
        display: none;
      }

      body.file-open #file-open-help {
        align-items: center;
        background: #eef1f4;
        color: #172026;
        display: flex;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        inset: 0;
        justify-content: center;
        padding: 32px;
        position: fixed;
        z-index: 10;
      }

      #file-open-help article {
        background: #ffffff;
        border: 1px solid #dce2e7;
        border-radius: 8px;
        max-width: 640px;
        padding: 24px;
      }

      #file-open-help h1 {
        font-size: 28px;
        margin: 0 0 10px;
      }

      #file-open-help p {
        line-height: 1.5;
      }

      #file-open-help code,
      #file-open-help a {
        color: #0b5f79;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="file-open-help" aria-live="polite">
      <article>
        <h1>Start the local game server</h1>
        <p>
          This source <code>index.html</code> is transformed by Vite, so opening it directly with
          <code>file://</code> will not run the React app.
        </p>
        <p>
          Use <a href="http://127.0.0.1:5173">http://127.0.0.1:5173</a> while the dev server is running,
          or open <code>dist/index.html</code> after running <code>npm run build</code>.
        </p>
      </article>
    </div>
    <script>
      if (window.location.protocol === "file:" && !window.location.pathname.toLowerCase().includes("/dist/")) {
        document.body.classList.add("file-open");
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
